<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthony Franzè — Practice Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #D85A30;
  --black: #1a1918;
  --grey-dark: #252422;
  --grey-mid: #3d3b39;
  --grey-light: #7a7875;
  --white: #f5f3ef;
  --white-dim: rgba(245,243,239,0.65);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.2rem 0.5rem 2rem;
}
header { text-align: center; margin-bottom: 0.75rem; }
header h1 {
  font-size: clamp(14px, 2.2vw, 18px);
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--white-dim);
}
header span { color: var(--orange); font-weight: 500; }

#tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 0.4rem;
  border: 0.5px solid rgba(245,243,239,0.25);
  border-radius: 6px;
  overflow: hidden;
}
.tab-btn {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  padding: 8px 24px;
  background: transparent;
  color: var(--grey-light);
  border: none;
  cursor: pointer;
  transition: all 0.18s;
  text-transform: uppercase;
}
.tab-btn:first-child { border-right: 0.5px solid rgba(245,243,239,0.25); }
.tab-btn.active { background: var(--orange); color: #fff; }
.tab-btn:not(.active):hover { color: var(--white); background: rgba(255,255,255,0.05); }

#wheel-hint {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--grey-light);
  letter-spacing: 0.06em;
  text-align: center;
  margin-bottom: 0.3rem;
}
#canvas-wrap { position: relative; width: 100%; max-width: 858px; }
canvas { display: block; width: 100%; cursor: default; }
#tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--grey-dark);
  border: 0.5px solid var(--orange);
  border-radius: 6px;
  padding: 6px 11px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--white);
  white-space: normal;
  max-width: 200px;
  line-height: 1.4;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 20;
}
#panel {
  width: 100%;
  max-width: 858px;
  min-height: 80px;
  padding: 16px 20px;
  border-top: 0.5px solid rgba(245,243,239,0.15);
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-start;
}
#panel-hint {
  font-size: 13px;
  color: var(--grey-light);
  letter-spacing: 0.06em;
  font-family: 'DM Mono', monospace;
  align-self: center;
}
#panel-content { display: none; width: 100%; }
#panel-title {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
#panel-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.pill {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  padding: 4px 10px;
  border-radius: 3px;
  border: 0.5px solid;
  cursor: default;
}
#conn-info {
  margin-top: 10px;
  font-size: 12px;
  color: var(--grey-light);
  font-family: 'DM Mono', monospace;
  display: none;
}
#controls {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 858px;
  padding: 10px 0 0;
  flex-wrap: wrap;
  align-items: center;
  border-top: 0.5px solid rgba(245,243,239,0.15);
}
#cat-sel, #entry-inp {
  background: var(--grey-dark);
  border: 0.5px solid var(--grey-mid);
  color: var(--white);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 4px;
  outline: none;
}
#cat-sel { flex: 1; min-width: 160px; }
#entry-inp { flex: 2; min-width: 180px; }
#cat-sel:focus, #entry-inp:focus { border-color: var(--orange); }
#add-btn, #reset-btn {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 6px 14px;
  border-radius: 4px;
  border: 0.5px solid var(--grey-mid);
  background: transparent;
  color: var(--white-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
#add-btn:hover { border-color: var(--orange); color: var(--orange); }
#reset-btn:hover { border-color: var(--white-dim); color: var(--white); }
#entry-count {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--grey-light);
  margin-left: auto;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Anthony Franzè — <span id="header-label">Practice Map</span></h1>
  </header>

  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('projects')">Projects</button>
    <button class="tab-btn" onclick="switchTab('skills')">Skills & Tools</button>
  </div>

  <div id="wheel-hint">click a segment to explore · hover nodes to preview</div>
  <div id="canvas-wrap">
    <canvas id="wc" width="858" height="858" role="img" aria-label="Radial practice map"></canvas>
    <div id="tooltip"></div>
  </div>

  <div id="panel">
    <div id="panel-hint">— click a segment to explore —</div>
    <div id="panel-content">
      <div id="panel-title"></div>
      <div id="panel-pills"></div>
      <div id="conn-info"></div>
    </div>
  </div>

  <div id="controls">
    <select id="cat-sel"></select>
    <input id="entry-inp" type="text" placeholder="add entry…" maxlength="70"/>
    <button id="add-btn" onclick="addEntry()">+ add</button>
    <button id="reset-btn" onclick="reset()">reset</button>
    <span id="entry-count"></span>
  </div>
</div>

<script>
const ORANGE = '#D85A30';
const WHITE = '#f5f3ef';
const WHITE_DIM = 'rgba(245,243,239,0.65)';
const GREY_DARK = '#252422';
const GREY_MID = '#3d3b39';
const GREY_LIGHT = '#7a7875';
const BLACK = '#1a1918';

const projectCats = [
  { id:'automotive', label:'Automotive\n& Vehicles',
    items:['Vehicle restraint & safety (Milford)','Cargo barrier MX-70','CabGard barrier','RDNS Gearsafe','Tow bars','Police barriers','Dog barrier','Bullbars','Nudge bars','Canopies','Side steps','Roll bars','Roof racks','Windshields','Light guards','Body kits','Fenders','Hard lids','Boot liners','Spoilers','Wheel covers','Sports bars','Trim & accessories','Mazda BT-50 facelift','Caravan bumper systems','Lightbar display – Supercheap Auto','Custom vehicle wraps','Boat dashes & interiors','Boat design studies'] },
  { id:'advanced', label:'Robotics &\nAdvanced Mfg',
    items:['Augmented fabrication AR framework (PhD)','Robotic 3D printing – polycarbonate structures','Robotic hot wire cutting & foam milling','3D-printed robotic end effectors','Digital fabrication pipeline – parametric geometries','ROBOBLOX Bioaugmented Blocks','Diatoma Pavilion (XR-assisted assembly)','RMIT Library (Roland Snooks)','Injection moulding optimisation','Tooling for plastics injection moulding','Part optimisation','Custom AR – steel fabrication','Custom AR – plastics manufacturers','Custom AR – medical, transport & boat fabricators','AR integration workshops – advanced manufacturers','Technology adoption co-design workshops','Technology roadmaps & reviews','Banana de-handing device'] },
  { id:'hrc', label:'Human-Robot\nCollaboration &\nAdditive Mfg',
    items:['Human-robot collaborative bricklaying','HRC system design – Building 4.0 CRC','XR interfaces for human-robot interaction','HoloLens 2 – industrial robot visualisation','Co-Design Project (XR-assisted design)','XR-guided fabrication (foam carving)','Mixed Reality Design-Build Workshop (Fologram)','Robotic additive manufacturing systems','ROBOBLOX Bioaugmented Blocks','3D-printed robotic end effectors','Robotic 3D printing – polycarbonate'] },
  { id:'xr', label:'XR / AR / VR',
    items:['AR co-design platform – YGCC logistics','Rapid Transition Glasses (AR/wearable)','AR integrated motorbike helmet','Custom AR experiences across sectors','VR in aged care & Transformational Toolkit'] },
  { id:'transport', label:'Future Transport\n& UAV',
    items:['Airbus UAV cargo drone','eVTOL exterior design','eVTOL interior design','BTWIN urban tricycle concept','Tandem concept vehicles','Peterbilt truck concepts','Future transport concepts for Shell','DARPA response vehicle challenge','Local Motors Rally Fighter – kick plate, bash plate, mirror','BMW driving experience app','Train interior seating'] },
  { id:'architecture', label:'Architecture\n& Public Realm',
    items:['DOHA Museum Ship playground','1MQ artwork – Melbourne Quarter','Hudson Yards timber seating & artworks','Hudson Yards Vessel','151 Clarence artworks','R17 Rooftop bar interior','Roy Martens Park bollards','Access ramps','UoS Judy Watson Entrapments','Seeds of Cosmos – Martin Place','Tappan Zee Bridge belvederes & terminus','171 George St artworks','The Shard Melbourne','Remember Me – Reko Rennie','Morpheus Hotel Dining Pods, Macau','480 Queen St Brisbane','100 Pacific Hwy','Architectural facades','Pergola system','Safety Line Jalousie'] },
  { id:'product', label:'Consumer &\nIndustrial Products',
    items:['Bathroom shelving system','Power drill','Flexible office system for IKEN','Personal shopping trolley','Sensorial bathing system','Portable Wind/PV Solution','Stratco Eco-Outback','Cuticle blade cutter','Custom fingernail remover','Foldable bowl & sport bottle','Roller shutter device housing','Custom performance computer cases','Nupak food packaging','Skin tissue engineering device','MIG welding equipment','GASLOG monitoring devices','Oyster farming baskets','Custom timber furniture','Solar Shed','EV battery systems','Home wall-mounted battery cases','Coca-Cola display systems','Frozen Coke systems','Coles display systems','Chemist displays','Building display systems','Product display systems','Sticker spinners','Misticool organic produce keeper','Line drawings for product manuals','SMARTBOXT artwork inventory system','Perpetual motion toys'] },
  { id:'health', label:'Health &\nAssistive Tech',
    items:['Spinal Life wheelchair grips & assistive tech (co-design)','3D-printed assistive tech – spinal cord injuries','Skin tissue engineering device','VR in aged care & Transformational Toolkit','VR training for aged care staff','Aged care VR experience facilitation','Assistive device prototyping for Spinal Life Australia','User research with people living with disability','Co-design for assistive technology translation'] },
  { id:'sustainability', label:'Sustainability\n& Environment',
    items:['Awareness display – Byron Bay','Life Cycle Analysis – automotive interiors','Cleantech startup mentoring (Energy Lab)','Sustainable oyster habitats & lighting','Stratco Eco-Outback','Portable Wind/PV solution','Solar Shed','EV battery systems'] },
  { id:'education', label:'Education\n& Research',
    items:['XR workshops – industry, government & education','AI workshops – industry, government & education','3D printing workshops – industry, government & education','Robotics workshops – industry, government & education','Technology adoption co-design workshops','Strategic grant development','Automotive AI design (Griffith)','Design curriculum development (Griffith)','Industry mentoring & co-supervision'] },
  { id:'research', label:'Research\nMethods',
    items:['Research-through-Design (RtD)','Situated Augmented Fabrication Scenarios (SAFS)','Field studies & ethnographic observation','Semi-structured interviews','Reflexive thematic analysis','Designerly reflection','Co-design workshops with domain experts','AR mockup development & prototyping','In-situ scenario-based enactments','Industry 4.0 / 5.0 framework development','User-centred design for advanced manufacturing','Qualitative data analysis','Technology adoption assessment for SMEs','Shadowing & contextual inquiry','Iterative prototype-driven research'] },
  { id:'creative', label:'Creative\n& Identity',
    items:['Custom liveries for racing drivers','Drag racing artworks for ANDRA','Commissioned artworks for sportsters','Cycle to cure jersey','Custom tattoo design','Concert posters','Patent drawings','Artist website','Hairdresser website','Food manufacturer branding & website'] },
];

const projectConns = [
  ['automotive','transport'],['automotive','product'],['automotive','sustainability'],
  ['advanced','hrc'],['advanced','xr'],['advanced','architecture'],['advanced','education'],
  ['hrc','xr'],['hrc','architecture'],['hrc','education'],
  ['xr','health'],['xr','transport'],['xr','education'],
  ['transport','sustainability'],
  ['architecture','creative'],['architecture','product'],
  ['health','product'],
  ['sustainability','education'],['sustainability','product'],
  ['research','advanced'],['research','hrc'],['research','xr'],['research','education'],['research','health'],
];

const skillCats = [
  { id:'cad', label:'Design &\nCAD',
    items:['Rhinoceros 3D','Grasshopper 3D','SolidWorks','Fusion 360','OnShape','Inventor','Blender','KeyShot','Autodesk Sketchbook','Parametric modelling','Surface modelling','Generative design','Digital twin development','Point cloud integration','Fabrication drawing production'] },
  { id:'xr', label:'XR & Interactive\nTechnologies',
    items:['Unity','Unreal Engine (Blueprint)','Vuforia','Fologram','TwinMotion','TwinBuild','Gravity Sketch','FIGMA','Microsoft HoloLens 2','Meta Quest 3','AR experience design','VR experience design','MR environment prototyping','Immersive training content','XR interface design'] },
  { id:'ai', label:'AI &\nGenerative Tools',
    items:['Vizcom','Midjourney','Adobe Firefly','Meshy','Nano Banana','AI-assisted concept generation','AI image-to-3D workflows','Prompt engineering for design','AI design critique & evaluation','Integrating AI into design pedagogy'] },
  { id:'robotics', label:'Robotics &\nAutomation',
    items:['ABB RobotStudio','RoboDK','Robots (Grasshopper plugin)','ABB collaborative robots','Universal Robots (UR e-Series)','KUKA industrial robots','Offline robot programming','Robot simulation','Grasshopper–robot integration','Robotic path planning','End effector design','Human-robot interaction design','Cobotic system setup'] },
  { id:'fabrication', label:'Digital\nFabrication',
    items:['FDM 3D printing','SLS 3D printing','Robotic additive manufacturing','CNC machining','Laser cutting','Waterjet cutting','Plasma cutting','Injection moulding','Metal fabrication','Moulding & casting','Large-scale foam milling','Robotic hot wire cutting','Composite fabrication','Workshop prototyping','Photogrammetry'] },
  { id:'programming', label:'Programming\n& Scripting',
    items:['Python','C# (Unity)','Grasshopper visual scripting','Grasshopper component development','RoboDK scripting','Arduino basics','Data analysis scripting','Automated fabrication workflows','Digital-to-physical pipeline scripting'] },
  { id:'adobe', label:'Visual\nCommunication',
    items:['Photoshop','Illustrator','InDesign','Premiere Pro','After Effects','Technical illustration','Patent drawing','Product rendering','Presentation design','Brand identity design','Motion graphics','Video editing','Print & digital collateral'] },
  { id:'research', label:'Research\nMethods',
    items:['Research-through-Design (RtD)','Situated Augmented Fabrication Scenarios (SAFS)','Field studies & ethnographic observation','Semi-structured interviews','Reflexive thematic analysis','Designerly reflection','Co-design workshops','In-situ scenario enactments','Contextual inquiry & shadowing','Iterative prototype-driven research','Qualitative data analysis','Framework development','Technology adoption assessment','Industry 4.0 / 5.0 strategy','Peer-reviewed publication'] },
  { id:'process', label:'Design\nProcess',
    items:['Design thinking','Human-centred design','Systems thinking','Life Cycle Analysis (LCA)','Circular design','Concept development','Sketching & ideation','Physical model making','Iterative prototyping','User testing & evaluation','Journey mapping','Problem framing','Design for manufacture & assembly (DFMA)','Design for sustainability','Cross-disciplinary collaboration'] },
  { id:'industry', label:'Industry &\nProject Skills',
    items:['Industry 4.0 technology adoption','SME innovation consulting','Technology roadmapping','Grant writing & development','Strategic planning','Stakeholder engagement','Transdisciplinary workshop facilitation','Industry-research partnership management','IP & patent development','Supply chain & manufacturing liaison','Supplier coordination','Technical documentation','Standards compliance (automotive)','Project management'] },
  { id:'academic', label:'Academic\n& Teaching',
    items:['Studio teaching – product & UX design','Curriculum design & development','Assessment design','HDR student supervision','Postgraduate mentoring','Peer review (journals & conferences)','Public lectures & demonstrations','Thesis examination','Industry-engaged teaching','Grant application writing','Research committee contribution','Open day & public engagement'] },
];

const skillConns = [
  ['cad','fabrication'],['cad','robotics'],['cad','xr'],
  ['xr','robotics'],['xr','research'],['xr','academic'],
  ['ai','cad'],['ai','academic'],
  ['robotics','fabrication'],['robotics','research'],
  ['fabrication','process'],['fabrication','industry'],
  ['programming','robotics'],['programming','cad'],
  ['research','academic'],['research','industry'],
  ['process','industry'],['process','academic'],
  ['industry','academic'],
  ['adobe','process'],
];

let currentTab = 'projects';
let cats = projectCats;
let connections = projectConns;

const TAU = Math.PI * 2;
const CW = 858, CH = 858;
const cx = CW/2, cy = CH/2;
const innerR = 86, segInnerR = 99, segOuterR = 231, nodeR = 281, labelR = 341, nodeDotR = 4.5;

let activeCat = null, hoverCat = null, hoverNode = null, activeNode = null;

const canvas = document.getElementById('wc');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tooltip');

function N(){ return cats.length; }
function slice(){ return TAU / N(); }
function startA(i){ return -TAU/4 + i*slice(); }

function nodePos(ci, ni){
  const cat = cats[ci];
  const n = cat.items.length;
  const a0 = startA(ci), a1 = a0 + slice();
  const mid = (a0+a1)/2;
  const spread = slice() * 0.82;
  const angle = n===1 ? mid : mid - spread/2 + (spread/(n-1))*ni;
  return { x: cx + nodeR*Math.cos(angle), y: cy + nodeR*Math.sin(angle), angle };
}

function catConns(ci){
  return connections.filter(c => c[0]===cats[ci].id || c[1]===cats[ci].id);
}
function catIndex(id){ return cats.findIndex(c=>c.id===id); }

function draw(){
  ctx.clearRect(0,0,CW,CH);
  const sl = slice();

  connections.forEach(([aid,bid])=>{
    const ai=catIndex(aid), bi=catIndex(bid);
    if(ai<0||bi<0) return;
    const aMid=startA(ai)+sl/2, bMid=startA(bi)+sl/2;
    const ax=cx+segOuterR*0.7*Math.cos(aMid), ay=cy+segOuterR*0.7*Math.sin(aMid);
    const bx=cx+segOuterR*0.7*Math.cos(bMid), by=cy+segOuterR*0.7*Math.sin(bMid);
    const isAct=activeCat!==null&&(activeCat===ai||activeCat===bi);
    ctx.save();
    ctx.globalAlpha=isAct?0.55:(activeCat!==null?0.04:0.07);
    ctx.strokeStyle=isAct?ORANGE:WHITE;
    ctx.lineWidth=isAct?1:0.5;
    ctx.setLineDash([3,5]);
    ctx.beginPath();
    ctx.moveTo(ax,ay);
    ctx.quadraticCurveTo(cx*0.35+ax*0.3+bx*0.35,cy*0.35+ay*0.3+by*0.35,bx,by);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  cats.forEach((cat,i)=>{
    const a0=startA(i), a1=a0+sl;
    const isAct=activeCat===i, isHov=hoverCat===i&&activeCat===null;
    const dimmed=activeCat!==null&&!isAct;
    const connected=activeCat!==null&&!isAct&&catConns(activeCat).some(c=>c[0]===cat.id||c[1]===cat.id);
    ctx.save();
    ctx.globalAlpha=dimmed?(connected?0.55:0.15):1;
    ctx.beginPath();
    ctx.moveTo(cx+segInnerR*Math.cos(a0+0.015),cy+segInnerR*Math.sin(a0+0.015));
    ctx.arc(cx,cy,segOuterR,a0+0.015,a1-0.015);
    ctx.arc(cx,cy,segInnerR,a1-0.015,a0+0.015,true);
    ctx.closePath();
    ctx.fillStyle=isAct?ORANGE:(isHov?'rgba(216,90,48,0.25)':(connected?'rgba(216,90,48,0.12)':'rgba(255,255,255,0.04)'));
    ctx.fill();
    ctx.strokeStyle=isAct?ORANGE:(connected?'rgba(216,90,48,0.4)':GREY_MID);
    ctx.lineWidth=isAct?1:0.5; ctx.stroke();

    cat.items.forEach((_,j)=>{
      const pos=nodePos(i,j);
      const ex=cx+segOuterR*Math.cos(pos.angle), ey=cy+segOuterR*Math.sin(pos.angle);
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(pos.x,pos.y);
      ctx.strokeStyle=isAct?'rgba(216,90,48,0.35)':'rgba(255,255,255,0.08)';
      ctx.lineWidth=0.5; ctx.stroke();
    });

    const la=(a0+a1)/2;
    const lx=cx+(segInnerR+(segOuterR-segInnerR)*0.5)*Math.cos(la);
    const ly=cy+(segInnerR+(segOuterR-segInnerR)*0.5)*Math.sin(la);
    const lines=cat.label.split('\n');
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`500 11px 'DM Sans', sans-serif`;
    ctx.fillStyle=isAct?'#fff':(isHov?ORANGE:(connected?ORANGE:WHITE_DIM));
    lines.forEach((line,li)=>{ ctx.fillText(line,lx,ly+(li-(lines.length-1)/2)*13); });
    ctx.restore();
  });

  cats.forEach((cat,i)=>{
    const isAct=activeCat===i;
    const dimmed=activeCat!==null&&!isAct;
    const connected=activeCat!==null&&!isAct&&catConns(activeCat).some(c=>c[0]===cat.id||c[1]===cat.id);
    cat.items.forEach((item,j)=>{
      const pos=nodePos(i,j);
      const isHovN=hoverNode&&hoverNode.c===i&&hoverNode.n===j;
      const isActN=activeNode&&activeNode.c===i&&activeNode.n===j;
      ctx.save();
      ctx.globalAlpha=dimmed?(connected?0.5:0.1):1;
      const sz=isHovN||isActN?7:nodeDotR;
      ctx.fillStyle=isAct?(isHovN||isActN?ORANGE:'rgba(216,90,48,0.7)'):(isHovN?ORANGE:GREY_MID);
      ctx.strokeStyle=isAct?ORANGE:(isHovN?ORANGE:GREY_MID);
      ctx.lineWidth=0.5;
      ctx.fillRect(pos.x-sz/2,pos.y-sz/2,sz,sz);
      ctx.strokeRect(pos.x-sz/2,pos.y-sz/2,sz,sz);
      if(isAct){
        const lx=cx+labelR*Math.cos(pos.angle), ly=cy+labelR*Math.sin(pos.angle);
        const deg=pos.angle*180/Math.PI;
        ctx.save(); ctx.translate(lx,ly);
        const flip=deg>90||deg<-90;
        ctx.rotate(pos.angle+(flip?Math.PI:0));
        ctx.textAlign=flip?'right':'left'; ctx.textBaseline='middle';
        ctx.font=`300 10px 'DM Mono', monospace`;
        ctx.fillStyle=isHovN?ORANGE:WHITE_DIM;
        ctx.fillText(item.length>36?item.slice(0,34)+'…':item,flip?-8:8,0);
        ctx.restore();
      }
      ctx.restore();
    });
  });

  ctx.beginPath(); ctx.arc(cx,cy,innerR,0,TAU);
  ctx.fillStyle=BLACK; ctx.fill();
  ctx.strokeStyle=activeCat!==null?ORANGE:GREY_MID;
  ctx.lineWidth=activeCat!==null?1:0.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx,cy,nodeR+16,0,TAU);
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=0.5; ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(activeCat!==null){
    const cat=cats[activeCat];
    ctx.font=`400 11px 'DM Mono', monospace`; ctx.fillStyle=ORANGE;
    ctx.fillText(cat.items.length+(currentTab==='projects'?' projects':' skills'),cx,cy+15);
    ctx.font=`500 18px 'DM Sans', sans-serif`; ctx.fillStyle=WHITE;
    ctx.fillText('AF',cx,cy-7);
  } else {
    ctx.font=`300 11px 'DM Mono', monospace`; ctx.fillStyle=GREY_LIGHT;
    ctx.fillText('click to',cx,cy-8); ctx.fillText('explore',cx,cy+10);
  }

  const total=cats.reduce((s,c)=>s+c.items.length,0);
  document.getElementById('entry-count').textContent=total+(currentTab==='projects'?' projects':' skills & tools')+' total';
}

function getHit(mx,my){
  const dx=mx-cx, dy=my-cy, dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>=nodeR-14&&dist<=nodeR+14){
    for(let i=0;i<N();i++){
      for(let j=0;j<cats[i].items.length;j++){
        const pos=nodePos(i,j);
        if(Math.abs(mx-pos.x)<=9&&Math.abs(my-pos.y)<=9) return {type:'node',c:i,n:j};
      }
    }
  }
  if(dist>=segInnerR&&dist<=segOuterR){
    let angle=Math.atan2(dy,dx);
    if(angle<-TAU/4) angle+=TAU;
    const idx=Math.floor((angle+TAU/4)/slice())%N();
    return {type:'cat',c:idx};
  }
  return null;
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect(), scale=CW/rect.width;
  const mx=(e.clientX-rect.left)*scale, my=(e.clientY-rect.top)*scale;
  const hit=getHit(mx,my);
  let newHC=null, newHN=null;
  if(hit){
    canvas.style.cursor='pointer';
    if(hit.type==='cat') newHC=hit.c;
    if(hit.type==='node'){
      newHN={c:hit.c,n:hit.n};
      tip.textContent=cats[hit.c].items[hit.n];
      tip.style.opacity='1';
      const px=mx/scale, py=my/scale;
      tip.style.left=Math.min(px+10,rect.width-210)+'px';
      tip.style.top=Math.max(py-44,4)+'px';
    } else { tip.style.opacity='0'; }
  } else { canvas.style.cursor='default'; tip.style.opacity='0'; }
  if(hoverCat!==newHC||JSON.stringify(hoverNode)!==JSON.stringify(newHN)){
    hoverCat=newHC; hoverNode=newHN; draw();
  }
});

canvas.addEventListener('mouseleave',()=>{ hoverCat=null; hoverNode=null; tip.style.opacity='0'; draw(); });

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect(), scale=CW/rect.width;
  const mx=(e.clientX-rect.left)*scale, my=(e.clientY-rect.top)*scale;
  const hit=getHit(mx,my);
  if(!hit){ reset(); return; }
  if(hit.type==='cat'){ activeCat=activeCat===hit.c?null:hit.c; activeNode=null; }
  if(hit.type==='node'){
    activeCat=hit.c;
    activeNode=(activeNode&&activeNode.c===hit.c&&activeNode.n===hit.n)?null:{c:hit.c,n:hit.n};
  }
  draw(); updatePanel();
});

function updatePanel(){
  const hint=document.getElementById('panel-hint');
  const content=document.getElementById('panel-content');
  const title=document.getElementById('panel-title');
  const pills=document.getElementById('panel-pills');
  const connInfo=document.getElementById('conn-info');
  if(activeCat===null){ hint.style.display=''; content.style.display='none'; return; }
  hint.style.display='none'; content.style.display='block';
  const cat=cats[activeCat];
  title.textContent=cat.label.replace('\n',' ');
  title.style.color=ORANGE;
  pills.innerHTML=cat.items.map((p,j)=>{
    const isActN=activeNode&&activeNode.c===activeCat&&activeNode.n===j;
    return `<span class="pill" style="background:${isActN?ORANGE:'rgba(216,90,48,0.1)'};color:${isActN?'#fff':ORANGE};border-color:${isActN?ORANGE:'rgba(216,90,48,0.3)'}">${p}</span>`;
  }).join('');
  const conns=catConns(activeCat);
  if(conns.length){
    connInfo.style.display='block';
    connInfo.innerHTML='connects to: '+conns.map(c=>{
      const other=c[0]===cat.id?c[1]:c[0];
      const oi=catIndex(other);
      return oi>=0?`<span style="color:${WHITE_DIM}">${cats[oi].label.replace('\n',' ')}</span>`:'';
    }).filter(Boolean).join(', ');
  } else { connInfo.style.display='none'; }
}

function reset(){
  activeCat=null; activeNode=null; hoverCat=null; hoverNode=null;
  tip.style.opacity='0'; draw(); updatePanel();
}

function populateSelect(){
  const sel=document.getElementById('cat-sel');
  sel.innerHTML=cats.map((c,i)=>`<option value="${i}">${c.label.replace('\n',' ')}</option>`).join('');
}

function addEntry(){
  const sel=document.getElementById('cat-sel');
  const inp=document.getElementById('entry-inp');
  const name=inp.value.trim();
  if(!name) return;
  const idx=parseInt(sel.value);
  cats[idx].items.push(name);
  inp.value='';
  if(activeCat===idx) updatePanel();
  draw();
}

document.getElementById('entry-inp').addEventListener('keydown',e=>{ if(e.key==='Enter') addEntry(); });

function switchTab(tab){
  if(tab===currentTab) return;
  currentTab=tab;
  cats = tab==='projects' ? projectCats : skillCats;
  connections = tab==='projects' ? projectConns : skillConns;
  document.getElementById('header-label').textContent = tab==='projects' ? 'Practice Map' : 'Skills & Tools Map';
  document.getElementById('entry-inp').placeholder = tab==='projects' ? 'add project name…' : 'add skill or tool…';
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', (i===0&&tab==='projects')||(i===1&&tab==='skills'));
  });
  reset();
  populateSelect();
}

populateSelect();
draw();
</script>
</body>
</html>
